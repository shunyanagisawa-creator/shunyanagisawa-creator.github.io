<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デリバティブ・クリアリングのすべて — 試し読み | 柳沢 俊</title>
<meta name="description" content="柳沢俊著『デリバティブ・クリアリングのすべて』序章・第1章を無料公開。OTCクリアリング、CCP、証拠金制度を体系的に解説。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --teal-dark: #1d5c5c;
  --teal: #2a7a7a;
  --gold: #b5832a;
  --navy: #1a2332;
  --toolbar: #2c2c2c;
  --toolbar-border: #444;
  --viewer-bg: #1e1e1e;
  --font-sans: 'Noto Sans JP', sans-serif;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'DM Mono', monospace;
  --nav-h: 48px;
  --top-h: 56px;   /* book info bar */
  --bar-h: 44px;   /* toolbar */
  --bot-h: 52px;   /* bottom nav */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-sans); background: var(--viewer-bg); color: #ccc; display: flex; flex-direction: column; }

/* ── TOP NAV ── */
.site-nav {
  height: var(--nav-h); flex-shrink: 0;
  background: white; border-bottom: 2px solid var(--teal-dark);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; gap: 1rem; z-index: 100;
}
.nav-logo { font-family: var(--font-display); font-size: .95rem; color: var(--navy); text-decoration: none; }
.nav-logo span { color: var(--teal-dark); }
.nav-right { display: flex; align-items: center; gap: .7rem; }
.btn-amazon {
  background: #FF9900; color: white; font-family: var(--font-sans);
  font-size: .72rem; font-weight: 500; padding: .35rem .9rem;
  text-decoration: none; transition: opacity .2s; white-space: nowrap;
}
.btn-amazon:hover { opacity: .85; }
.btn-back {
  font-family: var(--font-mono); font-size: .62rem; letter-spacing: .08em;
  color: var(--teal-dark); text-decoration: none;
  border: 1px solid var(--teal-dark); padding: .28rem .7rem;
  transition: all .2s; white-space: nowrap;
}
.btn-back:hover { background: var(--teal-dark); color: white; }

/* ── BOOK INFO BAR ── */
.book-bar {
  height: var(--top-h); flex-shrink: 0;
  background: var(--navy);
  display: flex; align-items: center; gap: 1.2rem;
  padding: 0 1.5rem;
  border-bottom: 3px solid var(--teal-dark);
  position: relative;
}
.book-bar::after {
  content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, var(--teal-dark), var(--gold));
}
.book-bar-cover { height: 40px; width: auto; box-shadow: 0 2px 8px rgba(0,0,0,.4); flex-shrink: 0; }
.book-bar-info { flex: 1; min-width: 0; }
.book-bar-title { font-size: .88rem; font-weight: 500; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-bar-sub { font-size: .72rem; color: rgba(255,255,255,.45); }
.book-bar-badge {
  font-family: var(--font-mono); font-size: .58rem; letter-spacing: .15em;
  text-transform: uppercase; color: var(--gold);
  border: 1px solid rgba(181,131,42,.4); padding: .22rem .6rem; white-space: nowrap;
}

/* ── TOOLBAR ── */
.toolbar {
  height: var(--bar-h); flex-shrink: 0;
  background: var(--toolbar); border-bottom: 1px solid var(--toolbar-border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1rem; gap: .6rem;
}
.tb-group { display: flex; align-items: center; gap: .5rem; }
.tb-btn {
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.85);
  border: 1px solid rgba(255,255,255,.15); padding: .3rem .7rem;
  font-family: var(--font-mono); font-size: .68rem; letter-spacing: .05em;
  cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: .3rem;
  white-space: nowrap;
}
.tb-btn:hover:not(:disabled) { background: rgba(255,255,255,.2); }
.tb-btn:disabled { opacity: .3; cursor: default; }
.tb-btn.active { background: var(--teal-dark); border-color: var(--teal-dark); color: white; }
.tb-sep { width: 1px; height: 22px; background: rgba(255,255,255,.15); }
.tb-page-info { font-family: var(--font-mono); font-size: .72rem; color: rgba(255,255,255,.7); display: flex; align-items: center; gap: .4rem; }
.tb-page-input {
  width: 44px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: white; text-align: center; padding: .25rem .3rem;
  font-family: var(--font-mono); font-size: .72rem; border-radius: 0;
}
.tb-page-input:focus { outline: none; border-color: var(--teal); }
.tb-zoom {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.85); padding: .28rem .5rem;
  font-family: var(--font-mono); font-size: .68rem; cursor: pointer;
}

/* ── VIEWER STAGE ── */
.viewer-stage {
  flex: 1; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--viewer-bg); position: relative;
}

/* Left/Right click zones */
.click-zone {
  position: absolute; top: 0; bottom: 0; width: 15%;
  z-index: 10; cursor: pointer; display: flex; align-items: center;
  opacity: 0; transition: opacity .2s;
}
.click-zone:hover { opacity: 1; }
.click-zone.left { left: 0; justify-content: flex-start; padding-left: .8rem; }
.click-zone.right { right: 0; justify-content: flex-end; padding-right: .8rem; }
.click-arrow {
  width: 44px; height: 44px; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: white; transition: background .15s;
}
.click-zone:hover .click-arrow { background: rgba(255,255,255,.25); }

/* Canvas area */
.canvas-area {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; height: 100%;
  transition: opacity .2s;
}
.canvas-area.transitioning { opacity: 0; }

.page-canvas-wrap {
  position: relative; flex-shrink: 0;
  box-shadow: 0 4px 24px rgba(0,0,0,.7);
}
.page-canvas-wrap canvas { display: block; }

/* Loading */
#loading {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: rgba(255,255,255,.6); font-family: var(--font-mono); font-size: .78rem; letter-spacing: .1em;
  gap: 1rem;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1);
  border-top-color: var(--teal); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  height: var(--bot-h); flex-shrink: 0;
  background: var(--toolbar); border-top: 1px solid var(--toolbar-border);
  display: flex; align-items: center; justify-content: center;
  gap: 1.5rem; padding: 0 1.5rem;
}
.progress-track {
  flex: 1; max-width: 400px; height: 4px;
  background: rgba(255,255,255,.12); border-radius: 2px;
  cursor: pointer; position: relative;
}
.progress-fill {
  height: 100%; background: var(--teal); border-radius: 2px;
  width: 0%; transition: width .2s; pointer-events: none;
}
.progress-thumb {
  position: absolute; top: 50%; width: 12px; height: 12px;
  background: white; border-radius: 50%; transform: translate(-50%, -50%);
  pointer-events: none; box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.bottom-label {
  font-family: var(--font-mono); font-size: .65rem;
  color: rgba(255,255,255,.5); white-space: nowrap;
}
.bottom-cta-link {
  font-family: var(--font-mono); font-size: .62rem; letter-spacing: .08em;
  color: var(--gold); text-decoration: none;
  border: 1px solid rgba(181,131,42,.4); padding: .25rem .7rem;
  transition: all .2s; white-space: nowrap;
}
.bottom-cta-link:hover { background: var(--gold); color: white; }

/* Error state */
.error-state {
  text-align: center; padding: 2rem;
  font-family: var(--font-mono); font-size: .78rem; letter-spacing: .08em;
  color: rgba(255,255,255,.5); line-height: 2;
}
.error-state strong { color: rgba(255,255,255,.8); }

/* Mobile adjustments */
@media (max-width: 640px) {
  .book-bar-badge { display: none; }
  .tb-group.hide-mobile { display: none; }
  .click-zone { width: 20%; }
  .bottom-cta-link { display: none; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="site-nav">
  <a class="nav-logo" href="https://shun-yanagisawa.com">Shun <span>Yanagisawa</span></a>
  <div class="nav-right">
    <a class="btn-amazon" href="https://amzn.asia/d/00Aawrf8" target="_blank">Amazonで購入</a>
    <a class="btn-back" href="https://shun-yanagisawa.com#publications">← 著者ページ</a>
  </div>
</nav>

<!-- Book Info Bar -->
<div class="book-bar">
  <img class="book-bar-cover" src="book-cover.png" alt="書影">
  <div class="book-bar-info">
    <div class="book-bar-title">デリバティブ・クリアリングのすべて</div>
    <div class="book-bar-sub">柳沢 俊（Shun Yanagisawa）｜2026年2月出版</div>
  </div>
  <div class="book-bar-badge">序章 + 第1章 無料公開</div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="tb-group">
    <button class="tb-btn" id="btnFirst"  onclick="goPage(1)"            title="最初のページ">⏮</button>
    <button class="tb-btn" id="btnPrev"   onclick="turnPage(-1)"         title="前のページ">◀ 前へ</button>
    <div class="tb-page-info">
      <input class="tb-page-input" id="pageInput" type="number" min="1" value="1"
             onchange="goPage(+this.value)" onkeydown="if(event.key==='Enter')goPage(+this.value)">
      <span>/ <span id="totalPagesLabel">—</span></span>
    </div>
    <button class="tb-btn" id="btnNext"   onclick="turnPage(1)"          title="次のページ">次へ ▶</button>
    <button class="tb-btn" id="btnLast"   onclick="goPage(9999)"         title="最後のページ">⏭</button>
  </div>

  <div class="tb-group">
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="btnSpread" onclick="toggleSpread()" title="見開き/単ページ切替">
      <span id="spreadLabel">見開き 📖</span>
    </button>
    <div class="tb-sep hide-mobile"></div>
    <select class="tb-zoom hide-mobile" id="zoomSel" onchange="setZoom(this.value)">
      <option value="auto" selected>自動フィット</option>
      <option value="0.6">60%</option>
      <option value="0.75">75%</option>
      <option value="0.9">90%</option>
      <option value="1.0">100%</option>
      <option value="1.25">125%</option>
    </select>
    <div class="tb-sep hide-mobile"></div>
    <button class="tb-btn hide-mobile" onclick="downloadPDF()">⬇ DL</button>
  </div>
</div>

<!-- Viewer Stage -->
<div class="viewer-stage" id="stage">

  <!-- Click zones -->
  <div class="click-zone left" onclick="turnPage(-1)">
    <div class="click-arrow">◀</div>
  </div>
  <div class="click-zone right" onclick="turnPage(1)">
    <div class="click-arrow">▶</div>
  </div>

  <!-- Canvas area -->
  <div class="canvas-area" id="canvasArea">
    <div class="page-canvas-wrap" id="wrapL"><canvas id="canvasL"></canvas></div>
    <div class="page-canvas-wrap" id="wrapR" style="display:none;"><canvas id="canvasR"></canvas></div>
  </div>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <span>PDFを読み込んでいます...</span>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <span class="bottom-label" id="bottomLabel">— / —</span>
  <div class="progress-track" id="progressTrack" onclick="seekProgress(event)">
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-thumb" id="progressThumb"></div>
  </div>
  <a class="bottom-cta-link" href="https://amzn.asia/d/00Aawrf8" target="_blank">続きはAmazonで →</a>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PDF_URL   = 'book-preview.pdf';
let pdfDoc      = null;
let currentPage = 1;       // always the left page (or single page)
let spreadMode  = true;    // show 2 pages
let zoomMode    = 'auto';  // 'auto' or a number
let rendering   = false;
let pendingPage = null;

const stage    = document.getElementById('stage');
const areaEl   = document.getElementById('canvasArea');
const canvasL  = document.getElementById('canvasL');
const canvasR  = document.getElementById('canvasR');
const ctxL     = canvasL.getContext('2d');
const ctxR     = canvasR.getContext('2d');
const wrapR    = document.getElementById('wrapR');
const loadEl   = document.getElementById('loading');

// ── INIT ──────────────────────────────────────────────
pdfjsLib.getDocument(PDF_URL).promise
  .then(doc => {
    pdfDoc = doc;
    document.getElementById('totalPagesLabel').textContent = doc.numPages;
    document.getElementById('pageInput').max = doc.numPages;
    loadEl.style.display = 'none';
    render(1);
  })
  .catch(() => {
    loadEl.innerHTML = `
      <div class="error-state">
        <div style="font-size:2rem;margin-bottom:.8rem">📄</div>
        <strong>book-preview.pdf</strong> が見つかりません<br>
        このHTMLファイルと同じフォルダに<br>
        <strong>book-preview.pdf</strong> をアップロードしてください
      </div>`;
  });

// ── SCALE CALCULATION ─────────────────────────────────
const DPR = window.devicePixelRatio || 1; // Retina対応

function getScale(vpW, vpH) {
  const stageW = stage.clientWidth  - 32;
  const stageH = stage.clientHeight - 16;
  const baseScale = (() => {
    if (zoomMode !== 'auto') return parseFloat(zoomMode);
    const cols = (spreadMode && pdfDoc && currentPage < pdfDoc.numPages) ? 2 : 1;
    const gap   = cols > 1 ? 4 : 0;
    const scaleW = (stageW - gap) / (vpW * cols);
    const scaleH = stageH / vpH;
    return Math.min(scaleW, scaleH, 1.6);
  })();
  return baseScale; // CSS scale — DPR applied separately in renderCanvas
}

// Render a single page onto a canvas at DPR-aware resolution
async function renderCanvas(pdfPage, canvas, ctx, scale) {
  const viewport = pdfPage.getViewport({ scale: scale * DPR });
  // Physical canvas size = CSS size × DPR (sharp on Retina)
  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  // CSS display size = physical / DPR (keeps layout correct)
  canvas.style.width  = (viewport.width  / DPR) + 'px';
  canvas.style.height = (viewport.height / DPR) + 'px';
  await pdfPage.render({ canvasContext: ctx, viewport }).promise;
}

// ── RENDER ────────────────────────────────────────────
async function render(pageNum) {
  if (!pdfDoc) return;
  pageNum = Math.max(1, Math.min(pageNum, pdfDoc.numPages));

  if (rendering) { pendingPage = pageNum; return; }
  rendering = true;

  // Transition out
  areaEl.classList.add('transitioning');
  await sleep(180);

  const pageL = await pdfDoc.getPage(pageNum);
  const vpL   = pageL.getViewport({ scale: 1 });
  const scale = getScale(vpL.width, vpL.height);

  // Render left canvas at full DPR resolution
  await renderCanvas(pageL, canvasL, ctxL, scale);

  // Right page (spread)
  const hasRight = spreadMode && pageNum + 1 <= pdfDoc.numPages;
  if (hasRight) {
    const pageR = await pdfDoc.getPage(pageNum + 1);
    await renderCanvas(pageR, canvasR, ctxR, scale);
    wrapR.style.display = 'block';
  } else {
    wrapR.style.display = 'none';
  }

  // Update state
  currentPage = pageNum;
  updateUI();

  // Transition in
  areaEl.classList.remove('transitioning');
  rendering = false;

  if (pendingPage !== null) {
    const p = pendingPage; pendingPage = null;
    render(p);
  }
}

// ── UI UPDATES ────────────────────────────────────────
function updateUI() {
  if (!pdfDoc) return;
  const total = pdfDoc.numPages;
  const end   = spreadMode ? Math.min(currentPage + 1, total) : currentPage;
  const label = currentPage === end ? `${currentPage} / ${total}` : `${currentPage}–${end} / ${total}`;
  document.getElementById('pageInput').value    = currentPage;
  document.getElementById('bottomLabel').textContent = `${label} ページ`;
  document.getElementById('btnFirst').disabled  = currentPage <= 1;
  document.getElementById('btnPrev').disabled   = currentPage <= 1;
  document.getElementById('btnNext').disabled   = end >= total;
  document.getElementById('btnLast').disabled   = end >= total;

  const pct = total > 1 ? ((currentPage - 1) / (total - 1)) * 100 : 0;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressThumb').style.left  = pct + '%';
}

// ── NAVIGATION ────────────────────────────────────────
function turnPage(dir) {
  if (!pdfDoc) return;
  const step = (spreadMode && pdfDoc.numPages > 1) ? 2 : 1;
  const next = currentPage + dir * step;
  render(Math.max(1, Math.min(next, pdfDoc.numPages)));
}

function goPage(n) {
  if (!pdfDoc) return;
  render(Math.max(1, Math.min(n, pdfDoc.numPages)));
}

function seekProgress(e) {
  if (!pdfDoc) return;
  const rect = document.getElementById('progressTrack').getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const page = Math.round(pct * (pdfDoc.numPages - 1)) + 1;
  render(page);
}

// ── SPREAD TOGGLE ─────────────────────────────────────
function toggleSpread() {
  spreadMode = !spreadMode;
  document.getElementById('spreadLabel').textContent = spreadMode ? '見開き 📖' : '単ページ 📄';
  document.getElementById('btnSpread').classList.toggle('active', spreadMode);
  render(currentPage);
}

// ── ZOOM ──────────────────────────────────────────────
function setZoom(v) {
  zoomMode = v;
  render(currentPage);
}

// ── DOWNLOAD ──────────────────────────────────────────
function downloadPDF() {
  const a = document.createElement('a');
  a.href = PDF_URL;
  a.download = 'デリバティブクリアリングのすべて_試し読み.pdf';
  a.click();
}

// ── KEYBOARD ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') turnPage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'   || e.key === 'PageUp')   turnPage(-1);
  if (e.key === 'Home') goPage(1);
  if (e.key === 'End')  goPage(9999);
});

// ── RESIZE ────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(currentPage), 200);
});

// ── SWIPE (mobile) ────────────────────────────────────
let touchX = null;
stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  touchX = null;
  if (Math.abs(dx) > 50) turnPage(dx < 0 ? 1 : -1);
}, { passive: true });

// ── HELPERS ───────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
